spring:
  application:
    name: salarylens

  datasource:
    url: jdbc:postgresql://localhost:5432/salarylens_db
    username: postgres
    password: admin123

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

    cache:
      type: redis
      redis:
        time-to-live: 3600000


jwt:
  secret: salarylens-secret-key-jo-bahut-lamba-hona-chahiye-production-mein
  expiration: 86400000

server:
  port: 8080

openai:
  api:
    key: ${OPENAI_API_KEY}
    url: https://api.openai.com/v1/chat/completions
    model: gpt-3.5-turbo
